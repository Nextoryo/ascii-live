<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ASCII NETFLIX</title>

<style>
body {
  background: black;
  color: white;
  font-family: monospace;
  margin: 0;
}

h1 {
  padding: 20px;
  color: red;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  padding: 20px;
  gap: 20px;
}

.card {
  border: 1px solid #444;
  padding: 15px;
  width: 220px;
  cursor: pointer;
}

.card:hover {
  border-color: white;
  transform: scale(1.05);
}

iframe {
  width: 100%;
  height: 400px;
  border: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎬 ASCII NETFLIX</h1>

<div class="grid" id="grid"></div>

<iframe id="viewer"></iframe>

<script>

// 👉 TU AJOUTES TES FICHIERS ICI (SEULEMENT ICI)
const files = [
  { name: "⚽ Finale 2022", file: "MartinezvsKoloMuani2022.html" },
  { name: "🌲 Forrest", file: "forrest.html" }
];

const grid = document.getElementById("grid");
const viewer = document.getElementById("viewer");

files.forEach(f => {
  const card = document.createElement("div");
  card.className = "card";
  card.innerText = f.name;

  card.onclick = () => {
    viewer.src = f.file;
  };

  grid.appendChild(card);
});

</script>

</body>
</html>
