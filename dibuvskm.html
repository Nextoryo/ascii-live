    @keyframes saveFlash {

      32%  { background: #002a00; }
      100% { background: #080808; }

    body.flash { animation: saveFlash 0.9s ease forwards; }

    /* blink for the save text */
    @keyframes blink {
      0%, 49% { opacity: 1; }

    .c-save { animation: blink 0.7s step-end 3; animation-fill-mode: forwards; }
    /* re-apply after first cycle to keep visible */
    .c-save-steady { color: #a6e3a1; text-shadow: 0 0 22px #a6e3a1aa, 0 0 50px #a6e3a155; }

// ─────────────────────────────────────────────────────────────────────────────
//  MOTEUR D'ANIMATION
// ─────────────────────────────────────────────────────────────────────────────

const screen = document.getElementById('screen');
const dotsEl = document.getElementById('dots');

// Crée les dots de progression
F.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.id = 'dot-' + i;
  dotsEl.appendChild(d);
});

let current = 0;
let paused  = false;
let timer   = null;
let saveTimeout = null;

function showFrame(i) {
  const frame = F[i];
  current = i;

  // met à jour le texte
  screen.textContent = frame.text;

  // enlève toutes les classes couleur
  screen.className = '';
  screen.classList.add(frame.color);

  // flash de fond pour le frame "arrêt"
  if (frame.flash) {
    document.body.classList.remove('flash');
    void document.body.offsetWidth; // force reflow
    document.body.classList.add('flash');
  }

  // après le blink du save, rend le texte stable
  if (frame.color === 'c-save') {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      screen.className = 'c-save-steady';
    }, 2200);
  }

  // met à jour les dots
  document.querySelectorAll('.dot').forEach((d, idx) => {
    d.classList.toggle('on', idx === i);
  });
}

function schedule() {
  clearTimeout(timer);
  if (!paused) {
    timer = setTimeout(() => {
      const next = (current + 1) % F.length;
      showFrame(next);
      schedule();
    }, F[current].delay);
  }
}

function goTo(i) {
  showFrame(i);
  schedule();
}

// ─── contrôles clavier ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  switch (e.key) {
    case ' ':
    case 'Spacebar':
      paused = !paused;
      if (!paused) schedule();
      else clearTimeout(timer);
      e.preventDefault();
      break;
    case 'ArrowRight':
      goTo((current + 1) % F.length);
      break;
    case 'ArrowLeft':
      goTo((current - 1 + F.length) % F.length);
      break;
    case 'r':
    case 'R':
      paused = false;
      goTo(0);
      break;
  }
});

// ─── contrôles tactiles (swipe) ──────────────────────────────────────────────
let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) {
    goTo(dx < 0
      ? (current + 1) % F.length
      : (current - 1 + F.length) % F.length);
  }
  touchX = null;
});

// ─── démarrage ───────────────────────────────────────────────────────────────
showFrame(0);
schedule();
</script>
